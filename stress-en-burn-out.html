  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: #6E97A8; color: #FFFFFF; text-decoration: none\">Maak een afspraak<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= PAGE HERO ================= -->\n  <section data-screen-label=\"Stress hero\" style=\"padding: clamp(48px, 6vw, 84px) 6vw clamp(36px, 4vw, 56px); text-align: center; display: flex; flex-direction: column; gap: 18px; align-items: center\">\n    <span style=\"font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #A9895B\">Ingrid Monsieur · arts – psychotherapeut – coach<\u002Fspan>\n    <h1 style=\"font-family: 'Cormorant Garamond', serif; font-size: clamp(38px, 4.2vw, 56px); font-weight: 500; line-height: 1.1; margin: 0; color: #2F3E3A\">Stress- &amp; burn-outbegeleiding<\u002Fh1>\n    <p style=\"font-size: 18px; line-height: 1.7; margin: 0; color: #4B5A55; max-width: 680px\">Stress is niet altijd slecht — ermee omgaan kan je leren. Samen brengen we jouw stressoren in kaart en werken we aan meer veerkracht.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ================= VOOR WIE ================= -->\n  <section data-screen-label=\"Voor wie\" style=\"background: #FFFFFF; border-top: 1px solid #E5DFCE; border-bottom: 1px solid #E5DFCE; padding: clamp(56px, 6vw, 88px) 6vw\">\n    <div class=\"gdv-stack\" style=\"max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: minmax(280px, 0.8fr) minmax(380px, 1.2fr); gap: clamp(36px, 5vw, 72px); align-items: start\">\n      <div class=\"gdv-sticky\" style=\"display: flex; flex-direction: column; gap: 16px; position: sticky; top: 120px\">\n        <span style=\"font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #A9895B\">Voor wie<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: clamp(30px, 3vw, 40px); font-weight: 500; line-height: 1.15; margin: 0; color: #2F3E3A\">Herken je jezelf hierin?<\u002Fh2>\n        <p style=\"font-size: 16px; line-height: 1.7; margin: 0; color: #4B5A55\">Eén ja is genoeg om eens vrijblijvend kennis te maken.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 12px\">\n        <sc-for list=\"{{ voorwie }}\" as=\"v\" hint-placeholder-count=\"6\">\n          <div style=\"display: flex; gap: 14px; align-items: baseline; background: #F9F7F0; border: 1px solid #EDE7D6; border-radius: 12px; padding: 15px 20px\">\n            <span style=\"width: 8px; height: 8px; border-radius: 50%; background: #8FB6C4; flex-shrink: 0; position: relative; top: -1px\"><\u002Fspan>\n            <span style=\"font-size: 15.5px; line-height: 1.6; color: #4B5A55\">{{ v }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= HOE ================= -->\n  <section data-screen-label=\"Hoe\" style=\"padding: clamp(56px, 6vw, 88px) 6vw\">\n    <div style=\"max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px\">\n      <div style=\"text-align: center; display: flex; flex-direction: column; gap: 14px; align-items: center\">\n        <span style=\"font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #A9895B\">Hoe<\u002Fspan>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: clamp(30px, 3vw, 40px); font-weight: 500; line-height: 1.15; margin: 0; color: #2F3E3A\">Zo werken we samen<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"gdv-stack-sm\" style=\"display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px\">\n        <sc-for list=\"{{ hoe }}\" as=\"h\" hint-placeholder-count=\"8\">\n          <div style=\"display: flex; gap: 16px; align-items: flex-start; background: #FFFFFF; border: 1px solid #E5DFCE; border-radius: 14px; padding: 22px 24px\">\n            <span style=\"font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: {{ h.tint }}; line-height: 1; min-width: 30px\">{{ h.nr }}<\u002Fspan>\n            <span style=\"font-size: 15.5px; line-height: 1.65; color: #4B5A55\">{{ h.tekst }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"font-size: 16px; line-height: 1.7; margin: 0 auto; color: #4B5A55; max-width: 720px; text-align: center\">Indien nodig kijken we samen naar het verleden, kwetsuren en vastgelopen relaties — om de energie weer te kunnen laten stromen.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= QUOTE ================= -->\n  <section data-screen-label=\"Quote Jung\" style=\"background: #EFE8D8; padding: clamp(44px, 5vw, 64px) 6vw; text-align: center\">\n    <p style=\"font-family: 'Cormorant Garamond', serif; font-size: clamp(24px, 2.4vw, 32px); font-style: italic; font-weight: 500; line-height: 1.45; color: #4B5A55; max-width: 820px; margin: 0 auto 10px\">“Er is geen verandering van duisternis naar licht, van stilstand naar beweging, zonder emotie.”<\u002Fp>\n    <span style=\"font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase; color: #A9895B\">— Carl Gustav Jung<\u002Fspan>\n  <\u002Fsection>\n\n  <!-- ================= BANNER ================= -->\n  <section id=\"contact\" data-screen-label=\"Contact banner\" style=\"background: #41605F; color: #F2EFE4; padding: clamp(48px, 5vw, 72px) 6vw 0; margin-top: auto\">\n    <div class=\"gdv-stack\" style=\"display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: clamp(32px, 4vw, 64px); max-width: 1200px; margin: 0 auto; padding-bottom: clamp(40px, 4vw, 56px)\">\n      <div style=\"display: flex; flex-direction: column; gap: 16px\">\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 2.8vw, 38px); font-weight: 500; line-height: 1.15; margin: 0; color: #F7F4EA\">Zullen we kennismaken?<\u002Fh2>\n        <p style=\"font-size: 16px; line-height: 1.7; margin: 0; color: #D6DCD3\">Neem gerust contact op voor een vrijblijvend kennismakingsgesprek.<\u002Fp>\n        <a href=\"contact.html\" style=\"display: inline-block; align-self: flex-start; background: #F7F4EA; color: #3A5450; padding: 13px 26px; border-radius: 999px; font-weight: 700; font-size: 15px; letter-spacing: 0.03em\" style-hover=\"background: #EFE8D8; color: #3A5450; text-decoration: none\">Naar de contactpagina<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 10px\">\n        <span style=\"font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #C7A97E\">Praktijk<\u002Fspan>\n        <div style=\"font-size: 16px; line-height: 1.8; color: #E9E6D8\">BV Dr. Ingrid Monsieur<br>Meiboom 10<br>1500 Halle<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 10px\">\n        <span style=\"font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #C7A97E\">Contact<\u002Fspan>\n        <div style=\"font-size: 16px; line-height: 1.8; color: #E9E6D8\">0472 78 70 05<br><a href=\"https://groeidoorverbinding.be\" style=\"color: #AECBBF\" style-hover=\"color: #F7F4EA\">groeidoorverbinding.be<\u002Fa><br>Sessies op afspraak<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top: 1px solid rgba(247, 244, 234, 0.22); max-width: 1200px; margin: 0 auto; padding: 20px 0 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; font-size: 13.5px; color: #B9C4B8\">\n      <span>© 2026 Groei door verbinding · Ingrid Monsieur<\u002Fspan>\n      <div style=\"display: flex; gap: 22px\">\n        <a href=\"contact.html#privacy\" style=\"color: #B9C4B8\" style-hover=\"color: #F7F4EA\">Privacyverklaring<\u002Fa>\n        <span>Ond. nr. 0821.516.358<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { menuOpen: false };\n  renderVals() {\n    const tints = ['#C7A97E', '#8FB6C4', '#679C7C', '#A9895B'];\n    return {\n      menuOpen: this.state.menuOpen,\n      openMenu: () => this.setState({ menuOpen: true }),\n      sluitMenu: () => this.setState({ menuOpen: false }),\n      voorwie: [\n        'Voel je dat stress grote impact heeft op je kwaliteit van leven, loop je aan tegen een burn-out of zit je al thuis met die diagnose?',\n        'Word je overweldigd door emoties en weet je niet waarom?',\n        'Wil je andere keuzes maken in je leven, maar durf je niet of kom je niet tot actie?',\n        'Loopt het stroef op je werk of thuis, ondanks je inzet? Kom je niet meer toe aan ontspanning?',\n        'Heb je geleerd om nooit op te geven — en voel je soms uitputting?',\n        'Heb je psychosomatische klachten (spierspanning, hoofdpijn, slecht slapen, hartkloppingen …) zonder duidelijke verklaring?',\n        'Blijf je vastzitten in piekeren? Heb je zingevingsvragen?',\n      ],\n      hoe: [\n        'Inzicht verwerven in stress en menselijke reacties erop: stress is niet altijd slecht, ermee omgaan kan je leren.',\n        'Begeleiding in bewustwording, keuzes maken, persoonlijke groei, relaties en levensvragen.',\n        'Doelgericht coachen op een door jou gekozen doel.',\n        'Opnieuw contact maken met gevoelens en je lijf, zonder het rationele overboord te gooien: hoofd en hart op elkaar afstemmen, lichaamswijsheid integreren.',\n        'Oude patronen in denken en gedrag doorbreken die je niet meer dienen; nieuw perspectief bieden.',\n        'Kwetsbaarheid toelaten.',\n        'Verbeelding inzetten.',\n        'Waar nodig samen naar het verleden kijken om de energie weer te laten stromen.',\n      ].map((tekst, i) => ({ tekst, nr: String(i + 1).padStart(2, '0'), tint: tints[i % 4] })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
